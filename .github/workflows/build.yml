name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'bancoudea/**'
      - '.github/workflows/build.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'bancoudea/**'
      - '.github/workflows/build.yml'

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bancoudea

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: ./mvnw -B test

  sonar:
    name: SonarCloud analysis
    needs: tests
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    defaults:
      run:
        working-directory: bancoudea

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Skip SonarCloud when token is missing
        if: env.SONAR_TOKEN == ''
        run: echo 'SONAR_TOKEN is not configured yet. Skipping analysis.'

      - name: Run SonarCloud analysis
        if: env.SONAR_TOKEN != ''
        run: ./mvnw -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar

  build:
    name: Build JAR
    needs: sonar
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bancoudea

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: ./mvnw -B package -DskipTests --file pom.xml

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: bancoudea-artifact
          path: bancoudea/target/*.jar

  security:
    name: Snyk scan
    needs: build
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Skip Snyk when token is missing
        if: env.SNYK_TOKEN == ''
        run: echo 'SNYK_TOKEN is not configured yet. Skipping security scan.'

      - name: Run Snyk to check for vulnerabilities
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=bancoudea/pom.xml

  docker:
    name: Docker image
    needs: security
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR artifact
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: actions/download-artifact@v4
        with:
          name: bancoudea-artifact
          path: bancoudea/target

      - name: Build & push Docker image
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/bancoudea
          tags: latest
          registry: docker.io
          dockerfile: bancoudea/Dockerfile
          directory: bancoudea
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Skip Docker publish when secrets are missing
        if: env.DOCKER_USERNAME == '' || env.DOCKER_PASSWORD == ''
        run: echo 'Docker Hub secrets are not configured yet. Skipping image publishing.'

  deploy-render:
    name: Deploy to Render
    needs: docker
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger Render deployment
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Skip Render deployment when secret is missing
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: echo 'RENDER_DEPLOY_HOOK_URL is not configured yet. Skipping cloud deployment.'
